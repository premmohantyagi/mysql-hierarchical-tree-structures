<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Schema &mdash; Hierarchical Tree Structures in MySQL</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
<style>
    body { background: #f5f7fb; }
    .hero { background: linear-gradient(135deg, #dc2626 0%, #f97316 100%); color: #fff; }

    .docs-card { max-width: 900px; margin: 0 auto; }
    .docs-body { padding: 0; }

    .docs-body pre {
        border-radius: 0 0 .375rem .375rem;
        padding: 1.5rem 1.75rem;
        font-size: .85rem; line-height: 1.55;
        margin: 0; overflow-x: auto;
        box-shadow: none;
    }

    .toolbar {
        display: flex; justify-content: space-between; align-items: center;
        padding: .75rem 1.25rem;
        background: #fff; border-bottom: 1px solid #e2e8f0;
        border-radius: .375rem .375rem 0 0;
    }
    .toolbar .filename { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                         color: #475569; font-size: .9rem; }

    .docs-loading { padding: 4rem 2rem; text-align: center; color: #94a3b8; }
</style>
</head>
<body>

<div class="hero py-4 mb-4 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
            <h1 class="h3 mb-1"><i class="bi bi-database-fill me-2"></i>Database Schema</h1>
            <p class="mb-0 opacity-75">Hierarchical Tree Structures in MySQL</p>
        </div>
        <a href="index.php" class="btn btn-light">
            <i class="bi bi-arrow-left me-1"></i>Back to Playground
        </a>
    </div>
</div>

<div class="container pb-5">
    <div class="card shadow-sm docs-card">
        <div class="toolbar">
            <span class="filename"><i class="bi bi-file-earmark-code me-1"></i>schema.sql</span>
            <button id="copyBtn" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-clipboard me-1"></i>Copy
            </button>
        </div>
        <article id="schema" class="docs-body">
            <div class="docs-loading">
                <div class="spinner-border text-primary" role="status"></div>
                <div class="mt-2">Loading schema&hellip;</div>
            </div>
        </article>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js" data-manual></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
<script>
let rawSql = '';
fetch('schema.sql')
    .then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(sql => {
        rawSql = sql;
        const code = document.createElement('code');
        code.className = 'language-sql';
        code.textContent = sql;
        const pre = document.createElement('pre');
        pre.className = 'language-sql';
        pre.appendChild(code);
        const host = document.getElementById('schema');
        host.innerHTML = '';
        host.appendChild(pre);
        Prism.highlightElement(code);
    })
    .catch(() => {
        document.getElementById('schema').innerHTML =
            '<div class="alert alert-danger m-3">Could not load <code>schema.sql</code>. Make sure the file is in the same folder as <code>schema.html</code>.</div>';
    });

document.getElementById('copyBtn').addEventListener('click', async (e) => {
    if (!rawSql) return;
    await navigator.clipboard.writeText(rawSql);
    const btn = e.currentTarget;
    btn.innerHTML = '<i class="bi bi-check2 me-1"></i>Copied';
    setTimeout(() => { btn.innerHTML = '<i class="bi bi-clipboard me-1"></i>Copy'; }, 1500);
});
</script>
</body>
</html>
